<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Design Offer</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif
    
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    padding: 30px;
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 38px;
    color: #00ffd5;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    margin: 10px 0;
}

.price {
    font-size: 32px;
    color: #ffcc00;
    margin: 20px 0;
    font-weight: bold;
}

.btn {
    display: inline-block;
    padding: 15px 30px;
    background: #25D366;
    color: white;
    text-decoration: none;
    font-size: 18px;
    border-radius: 50px;
    transition: 0.3s;
}

.btn:hover {
    background: #1da851;
    transform: scale(1.05);
}

.footer {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.8;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🔥 NAKUTENGENEZEA WEBSITE 🔥</h1>

    </div>
</div>

</body>
</html>
